        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

            outline: none;
            border-bottom-color: #C9963A;

<main class="flex min-h-screen w-full overflow-hidden">

<section class="hidden lg:block w-[55%] relative overflow-hidden">

<div class="absolute inset-0 gold-vignette z-20"></div>

<!-- Branding Overlay (Top Left) -->
<div class="absolute top-12 left-12 z-30 flex items-center space-x-4">
<img src="logos/logotipo.svg" alt="Advance Estate" style="height:64px;width:auto;filter:brightness(1.05);">
</div>
</section>
<!-- Right Section: Auth Form -->
<section class="w-full lg:w-[45%] bg-obsidian-panel flex flex-col items-center justify-center px-8 lg:px-24">
<div class="w-full max-w-md space-y-12">
<!-- Mobile Branding (Visible only on small screens) -->
<div class="lg:hidden flex flex-col items-center mb-12">
<img src="logos/logotipo.svg" alt="Advance Estate" style="height:56px;width:auto;filter:brightness(1.05);margin-bottom:1rem;">
<h1 class="font-headline text-xl font-bold text-white tracking-[0.1em] uppercase">Advance Estate</h1>
<p class="text-metadata text-[13px] font-body tracking-wide">RE/MAX Advance · República Dominicana</p>
</div>
<header class="space-y-2">
<h2 class="text-2xl font-headline font-bold text-white">Bienvenido</h2>
<p class="text-on-surface-variant text-sm font-body">Portal exclusivo para gestión patrimonial.</p>
</header>
<form class="space-y-8">
<div class="space-y-6">
<div class="relative">
<label class="block text-[10px] uppercase tracking-[0.2em] text-metadata mb-2">Correo Electrónico</label>
<input class="w-full bg-transparent border-0 border-b border-input-border px-0 py-3 text-on-surface custom-input placeholder:text-surface-container-highest transition-colors duration-300" placeholder="usuario@advanceestate.com" type="email"/>
</div>
<div class="relative">
<div class="flex justify-between items-end mb-2">
<label class="block text-[10px] uppercase tracking-[0.2em] text-metadata">Contraseña</label>
<a class="text-[11px] text-metadata hover:text-estate-gold transition-colors duration-200" href="#">¿Olvidaste tu contraseña?</a>
</div>
<input class="w-full bg-transparent border-0 border-b border-input-border px-0 py-3 text-on-surface custom-input placeholder:text-surface-container-highest transition-colors duration-300" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="space-y-6">
<button class="w-full h-12 bg-estate-gold text-surface-container-lowest font-body font-medium text-[15px] transition-all duration-300 hover:brightness-110 active:scale-[0.98]">
                            Iniciar sesión
                        </button>
<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-input-border"></div>
<span class="flex-shrink mx-4 text-[11px] text-metadata uppercase tracking-widest">o continúa con</span>
<div class="flex-grow border-t border-input-border"></div>
</div>
<button class="group w-full h-12 border border-input-border flex items-center justify-center space-x-3 transition-all duration-300 hover:bg-surface-container-low" type="button">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>

<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="text-on-surface font-body text-sm">Google Workspace</span>
</button>
</div>
</form>
<footer class="pt-12 border-t border-input-border/30 flex items-center justify-center">
<p class="text-[10px] text-metadata/50">© 2025 Advance Estate · RE/MAX Advance</p>
</footer>
</div>
</section>
</main>
<!-- Side Navigation Placeholder logic for active state - Not rendered as per suppression rules for login -->
<!-- But keeping side-nav style tokens for potential shell context if redirected -->
<div class="hidden">
<span class="material-symbols-outlined">domain</span>
